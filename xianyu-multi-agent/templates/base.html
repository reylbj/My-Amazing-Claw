<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}多账号智能管理系统{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Professional Custom CSS -->
    <link href="{{ url_for('static', filename='css/professional.css') }}" rel="stylesheet">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="bi bi-grid-3x3-gap"></i> 多账号管理系统
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
                            <i class="bi bi-kanban"></i> 账号管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'monitor' %}active{% endif %}" href="{{ url_for('monitor') }}">
                            <i class="bi bi-graph-up"></i> 运行监控
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}" href="{{ url_for('settings') }}">
                            <i class="bi bi-sliders"></i> 系统设置
                        </a>
                    </li>
                </ul>
                
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-tools"></i> 操作
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="{{ url_for('create_account') }}">添加账号</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" onclick="startAllAccounts()">启动所有账号</a></li>
                            <li><a class="dropdown-item" href="#" onclick="stopAllAccounts()">停止所有账号</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <!-- Flash Messages -->
        <div id="flash-messages"></div>
        
        {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="container">
            <p class="mb-0">多账号智能管理系统 - 专业的自动化解决方案</p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <!-- Common JS -->
    <script>
        // 显示消息
        function showMessage(message, type = 'info') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            document.getElementById('flash-messages').innerHTML = alertHtml;
            
            // 自动隐藏消息
            setTimeout(() => {
                const alert = document.querySelector('.alert');
                if (alert) {
                    alert.remove();
                }
            }, 5000);
        }

        // 启动所有账号
        async function startAllAccounts() {
            try {
                const response = await axios.post('/system/start_all');
                if (response.data.success) {
                    showMessage(response.data.message, 'success');
                    setTimeout(() => location.reload(), 2000);
                } else {
                    showMessage(response.data.message, 'danger');
                }
            } catch (error) {
                showMessage('操作失败: ' + error.message, 'danger');
            }
        }

        // 停止所有账号
        async function stopAllAccounts() {
            try {
                const response = await axios.post('/system/stop_all');
                if (response.data.success) {
                    showMessage(response.data.message, 'success');
                    setTimeout(() => location.reload(), 2000);
                } else {
                    showMessage(response.data.message, 'danger');
                }
            } catch (error) {
                showMessage('操作失败: ' + error.message, 'danger');
            }
        }

        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '从未';
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN');
        }

        // 获取状态标签
        function getStatusBadge(status) {
            const statusMap = {
                'connected': '<span class="badge bg-success"><i class="bi bi-wifi"></i> 已连接</span>',
                'connecting': '<span class="badge bg-warning"><i class="bi bi-arrow-repeat"></i> 连接中</span>',
                'disconnected': '<span class="badge bg-secondary"><i class="bi bi-wifi-off"></i> 已断开</span>',
                'error': '<span class="badge bg-danger"><i class="bi bi-exclamation-triangle"></i> 错误</span>',
                'stopped': '<span class="badge bg-secondary"><i class="bi bi-stop-circle"></i> 已停止</span>'
            };
            return statusMap[status] || '<span class="badge bg-secondary"><i class="bi bi-question-circle"></i> 未知</span>';
        }

        // 改进的确认对话框
        function showConfirmDialog(title, message, confirmText = '确认', type = 'primary') {
            return new Promise((resolve) => {
                const modal = document.createElement('div');
                modal.className = 'modal fade';
                modal.innerHTML = `
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">${title}</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <p>${message.replace(/\n/g, '<br>')}</p>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                <button type="button" class="btn btn-${type} confirm-btn">${confirmText}</button>
                            </div>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                const bootstrapModal = new bootstrap.Modal(modal);
                
                modal.querySelector('.confirm-btn').onclick = () => {
                    bootstrapModal.hide();
                    resolve(true);
                };
                
                modal.addEventListener('hidden.bs.modal', () => {
                    document.body.removeChild(modal);
                    resolve(false);
                });
                
                bootstrapModal.show();
            });
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
