{% extends "base.html" %}

{% block title %}运行监控 - 🐟多账号自动回复系统{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-activity"></i> 运行监控</h2>
            <div>
                <button class="btn btn-outline-primary" onclick="refreshData()">
                    <i class="bi bi-arrow-clockwise"></i> 刷新数据
                </button>
                <div class="form-check form-switch d-inline-block ms-3">
                    <input class="form-check-input" type="checkbox" id="auto-refresh" checked>
                    <label class="form-check-label" for="auto-refresh">
                        自动刷新
                    </label>
                </div>
            </div>
        </div>

        <!-- 系统概览 -->
        <div class="row mb-4">
            <div class="col-lg-3 col-md-6 mb-3">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h4 class="mb-0" id="total-accounts">0</h4>
                                <small>总账号数</small>
                            </div>
                            <i class="bi bi-people display-6"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h4 class="mb-0" id="running-accounts">0</h4>
                                <small>运行中</small>
                            </div>
                            <i class="bi bi-play-circle display-6"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <div class="card bg-warning text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h4 class="mb-0" id="connecting-accounts">0</h4>
                                <small>连接中</small>
                            </div>
                            <i class="bi bi-hourglass-split display-6"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <div class="card bg-danger text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h4 class="mb-0" id="error-accounts">0</h4>
                                <small>异常</small>
                            </div>
                            <i class="bi bi-exclamation-triangle display-6"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 账号详细状态 -->
        <div class="card">
            <div class="card-header">
                <h5><i class="bi bi-list-ul"></i> 账号详细状态</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" id="accounts-table">
                        <thead>
                            <tr>
                                <th>账号名称</th>
                                <th>用户ID</th>
                                <th>运行状态</th>
                                <th>连接状态</th>
                                <th>功能开关</th>
                                <th>最后活动</th>
                                <th>错误次数</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="accounts-tbody">
                            <tr>
                                <td colspan="8" class="text-center text-muted">
                                    <i class="bi bi-hourglass-split"></i> 加载中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 实时日志 -->
        <div class="card mt-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5><i class="bi bi-terminal"></i> 实时日志</h5>
                <div>
                    <button class="btn btn-sm btn-outline-secondary" onclick="clearLogs()">
                        <i class="bi bi-trash"></i> 清空
                    </button>
                    <div class="form-check form-switch d-inline-block ms-3">
                        <input class="form-check-input" type="checkbox" id="auto-scroll" checked>
                        <label class="form-check-label" for="auto-scroll">
                            自动滚动
                        </label>
                    </div>
                </div>
            </div>
            <div class="card-body p-0">
                <div id="log-container" style="height: 300px; overflow-y: auto; background-color: #1e1e1e; color: #d4d4d4; font-family: 'Consolas', monospace; font-size: 13px; padding: 15px;">
                    <div class="text-muted">等待日志数据...</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let refreshInterval = null;
    let logMessages = [];

    // 刷新数据
    async function refreshData() {
        try {
            const response = await axios.get('/api/accounts/status');
            if (response.data.success) {
                updateAccountsTable(response.data.data);
                updateOverviewStats(response.data.data);
            }
        } catch (error) {
            console.error('刷新数据失败:', error);
            showMessage('刷新数据失败: ' + error.message, 'danger');
        }
    }

    // 更新概览统计
    function updateOverviewStats(accounts) {
        const total = accounts.length;
        const running = accounts.filter(acc => acc.is_running).length;
        const connecting = accounts.filter(acc => acc.connection_status === 'connecting').length;
        const error = accounts.filter(acc => acc.connection_status === 'error' || acc.error_count > 0).length;

        document.getElementById('total-accounts').textContent = total;
        document.getElementById('running-accounts').textContent = running;
        document.getElementById('connecting-accounts').textContent = connecting;
        document.getElementById('error-accounts').textContent = error;
    }

    // 更新账号表格
    function updateAccountsTable(accounts) {
        const tbody = document.getElementById('accounts-tbody');
        
        if (accounts.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="text-center text-muted">暂无账号数据</td>
                </tr>
            `;
            return;
        }

        tbody.innerHTML = accounts.map(account => `
            <tr>
                <td>
                    <strong>${account.account_name}</strong>
                </td>
                <td>
                    <code>${account.user_id}</code>
                </td>
                <td>
                    ${account.is_running ? 
                        '<span class="badge bg-success">运行中</span>' : 
                        '<span class="badge bg-secondary">已停止</span>'
                    }
                </td>
                <td>
                    ${getStatusBadge(account.connection_status || 'disconnected')}
                </td>
                <td>
                    <small>
                        ${account.seller_enabled ? '<span class="badge bg-success">卖</span>' : '<span class="badge bg-secondary">卖</span>'}
                        ${account.buyer_enabled ? '<span class="badge bg-success">买</span>' : '<span class="badge bg-secondary">买</span>'}
                    </small>
                </td>
                <td>
                    <small>${formatTime(account.last_activity)}</small>
                </td>
                <td>
                    <span class="badge ${account.error_count > 0 ? 'bg-danger' : 'bg-success'}">
                        ${account.error_count || 0}
                    </span>
                </td>
                <td>
                    <div class="btn-group btn-group-sm">
                        ${!account.is_running ? 
                            `<button class="btn btn-success btn-sm" onclick="startAccount(${account.id})">启动</button>` :
                            `<button class="btn btn-danger btn-sm" onclick="stopAccount(${account.id})">停止</button>`
                        }
                        <a href="/account/${account.id}/config" class="btn btn-outline-primary btn-sm">配置</a>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    // 启动账号
    async function startAccount(accountId) {
        try {
            const response = await axios.post(`/account/${accountId}/start`);
            if (response.data.success) {
                showMessage(response.data.message, 'success');
                refreshData();
            } else {
                showMessage(response.data.message, 'danger');
            }
        } catch (error) {
            showMessage('启动失败: ' + error.message, 'danger');
        }
    }

    // 停止账号
    async function stopAccount(accountId) {
        try {
            const response = await axios.post(`/account/${accountId}/stop`);
            if (response.data.success) {
                showMessage(response.data.message, 'success');
                refreshData();
            } else {
                showMessage(response.data.message, 'danger');
            }
        } catch (error) {
            showMessage('停止失败: ' + error.message, 'danger');
        }
    }

    // 添加日志消息
    function addLogMessage(message, type = 'info') {
        const timestamp = new Date().toLocaleString('zh-CN');
        const typeColors = {
            'info': '#4fc3f7',
            'success': '#81c784',
            'warning': '#ffb74d',
            'error': '#e57373',
            'debug': '#9e9e9e'
        };
        
        const color = typeColors[type] || '#d4d4d4';
        const logHtml = `<div style="color: ${color}; margin-bottom: 4px;">[${timestamp}] ${message}</div>`;
        
        logMessages.push(logHtml);
        
        // 限制日志数量
        if (logMessages.length > 1000) {
            logMessages = logMessages.slice(-500);
        }
        
        updateLogDisplay();
    }

    // 更新日志显示
    function updateLogDisplay() {
        const container = document.getElementById('log-container');
        container.innerHTML = logMessages.join('');
        
        // 自动滚动到底部
        if (document.getElementById('auto-scroll').checked) {
            container.scrollTop = container.scrollHeight;
        }
    }

    // 清空日志
    function clearLogs() {
        logMessages = [];
        updateLogDisplay();
    }

    // 模拟日志数据（实际使用中应该通过WebSocket或SSE获取）
    function simulateLogData() {
        const messages = [
            '账号连接成功',
            '开始监听消息',
            '收到用户消息',
            'AI生成回复完成',
            '消息发送成功',
            'Token刷新完成'
        ];
        
        const types = ['info', 'success', 'warning'];
        
        setInterval(() => {
            if (Math.random() > 0.7) { // 30%概率添加日志
                const message = messages[Math.floor(Math.random() * messages.length)];
                const type = types[Math.floor(Math.random() * types.length)];
                addLogMessage(`[账号${Math.floor(Math.random() * 3) + 1}] ${message}`, type);
            }
        }, 2000);
    }

    // 页面加载完成
    document.addEventListener('DOMContentLoaded', function() {
        // 立即加载数据
        refreshData();
        
        // 模拟日志数据
        simulateLogData();
        
        // 设置自动刷新
        const autoRefreshCheckbox = document.getElementById('auto-refresh');
        
        function toggleAutoRefresh() {
            if (autoRefreshCheckbox.checked) {
                refreshInterval = setInterval(refreshData, 10000); // 10秒刷新
            } else {
                if (refreshInterval) {
                    clearInterval(refreshInterval);
                    refreshInterval = null;
                }
            }
        }
        
        autoRefreshCheckbox.addEventListener('change', toggleAutoRefresh);
        toggleAutoRefresh(); // 初始化
    });

    // 页面卸载时清理
    window.addEventListener('beforeunload', function() {
        if (refreshInterval) {
            clearInterval(refreshInterval);
        }
    });
</script>
{% endblock %}
